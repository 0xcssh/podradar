name: iOS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      export_method:
        description: "IPA export method (debugging = dev-signed for sideloading)"
        type: choice
        options: [debugging, app-store-connect]
        default: debugging

jobs:
  test:
    name: Build & unit test (Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          set -o pipefail
          # Runner images change simulator lineups; pick the first available iPhone.
          DEVICE=$(xcrun simctl list devices available | grep -Eo 'iPhone [^(]+' | head -1 | xargs)
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project PodRadar.xcodeproj \
            -scheme PodRadar \
            -destination "platform=iOS Simulator,name=$DEVICE" \
            CODE_SIGNING_ALLOWED=NO

  device-build:
    name: Signed device build (IPA)
    # Manual only: run from the Actions tab once signing secrets are configured.
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          # Both import steps must share the SAME keychain password — the
          # second one unlocks the keychain the first one created.
          keychain-password: ${{ github.run_id }}
          p12-file-base64: ${{ secrets.CERT_P12_BASE64 }}
          p12-password: ${{ secrets.CERT_P12_PASSWORD }}

      - name: Import distribution certificate (TestFlight only)
        if: github.event.inputs.export_method == 'app-store-connect'
        uses: apple-actions/import-codesign-certs@v3
        with:
          create-keychain: false
          keychain-password: ${{ github.run_id }}
          p12-file-base64: ${{ secrets.CERT_DIST_P12_BASE64 }}
          p12-password: ${{ secrets.CERT_P12_PASSWORD }}

      - name: Install App Store Connect API key
        run: |
          mkdir -p "$HOME/private_keys"
          echo "${{ secrets.ASC_API_KEY_P8_BASE64 }}" | base64 --decode \
            > "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"

      - name: Archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project PodRadar.xcodeproj \
            -scheme PodRadar \
            -destination 'generic/platform=iOS' \
            -archivePath build/PodRadar.xcarchive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}" \
            DEVELOPMENT_TEAM="${{ vars.APPLE_TEAM_ID }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export IPA
        run: |
          METHOD="${{ github.event.inputs.export_method || 'debugging' }}"
          # app-store-connect + destination upload sends the build straight to
          # TestFlight during the export; debugging keeps a local IPA artifact.
          if [ "$METHOD" = "app-store-connect" ]; then DEST="upload"; else DEST="export"; fi
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${METHOD}</string>
            <key>teamID</key>
            <string>${{ vars.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>destination</key>
            <string>${DEST}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/PodRadar.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8" \
            -authenticationKeyID "${{ secrets.ASC_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.ASC_ISSUER_ID }}"

      - name: Upload IPA artifact
        if: github.event.inputs.export_method != 'app-store-connect'
        uses: actions/upload-artifact@v4
        with:
          name: PodRadar-ipa
          path: build/export/*.ipa
