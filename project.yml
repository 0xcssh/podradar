name: PodRadar
options:
  bundleIdPrefix: com.awdia
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: 5.80.0

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0

targets:
  PodRadar:
    type: application
    platform: iOS
    sources:
      - PodRadar
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.awdia.podradar
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    info:
      path: PodRadar/Info.plist
      properties:
        CFBundleDisplayName: PodRadar
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSBluetoothAlwaysUsageDescription: "PodRadar scans nearby Bluetooth signals to help you locate your lost headphones."
        NSLocationWhenInUseUsageDescription: "PodRadar remembers where your headphones were last detected so you can find them on a map."
        # iPhone-only portrait app: opting out of iPad multitasking satisfies
        # App Store validation without declaring all four orientations.
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    # No entitlements yet: the App Group (group.com.podradar.app) doesn't
    # exist in the Apple Developer portal, and automatic signing can't
    # match a provisioning profile to an entitlement for a group that
    # isn't registered (same chicken-and-egg RepLock/Loopa hit — see
    # CLAUDE.md). DeviceStore falls back to UserDefaults.standard until
    # the group is created manually and this is re-added.

  PodRadarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PodRadarTests
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/PodRadar.app/PodRadar
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: PodRadar

schemes:
  PodRadar:
    build:
      targets:
        PodRadar: all
    test:
      targets:
        - PodRadarTests
